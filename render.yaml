# One-click deploy to Render: a Dockerized web service + managed Postgres.
# Set the `sync: false` secrets in the Render dashboard after the first deploy.
services:
  - type: web
    name: ai-github-reviewer
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: ai-reviewer-db
          property: connectionString
      - key: LLM_PROVIDER
        value: openai
      - key: LLM_MODEL
        value: gpt-4o
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GITHUB_APP_ID
        sync: false
      - key: GITHUB_WEBHOOK_SECRET
        sync: false
      - key: GITHUB_APP_PRIVATE_KEY
        sync: false
      - key: GITHUB_TOKEN
        sync: false

databases:
  - name: ai-reviewer-db
    plan: free
